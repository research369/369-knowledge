name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── TypeScript Check ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Check Backend
        run: cd packages/backend && pnpm typecheck

      - name: Check Frontend
        run: cd packages/frontend && pnpm typecheck

  # ─── Deploy Backend to Railway ─────────────────────────────────────────────
  # Railway auto-deploys on push via GitHub integration (serviceConnect)
  # This job just confirms the push reached GitHub successfully
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Railway deploys automatically via GitHub integration
        run: |
          echo "✅ Railway is connected to research369/369-knowledge@main"
          echo "✅ Railway will auto-deploy this commit: ${{ github.sha }}"
          echo "✅ Dockerfile: packages/backend/Dockerfile (Root context)"
          echo "✅ No manual trigger needed"

  # ─── Deploy Frontend to Netlify ────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Netlify)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        run: cd packages/frontend && pnpm build
        env:
          VITE_API_URL: https://backend-production-77f3.up.railway.app

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          cd packages/frontend
          netlify deploy \
            --auth "$NETLIFY_AUTH_TOKEN" \
            --site "$NETLIFY_SITE_ID" \
            --dir "dist" \
            --prod \
            --message "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
