name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── TypeScript Check ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Check Backend
        run: cd packages/backend && pnpm typecheck

      - name: Check Frontend
        run: cd packages/frontend && pnpm typecheck

  # ─── Deploy Backend to Railway ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Railway Deploy via GraphQL API
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation{serviceInstanceDeploy(serviceId:\"${{ secrets.RAILWAY_SERVICE_ID }}\",environmentId:\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\")}" }')
          echo "Railway response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"serviceInstanceDeploy":true'; then
            echo "✅ Railway deploy triggered successfully"
          else
            echo "❌ Railway deploy trigger failed"
            echo "$RESPONSE"
            exit 1
          fi

  # ─── Deploy Frontend to Netlify ────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Netlify)
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Build Frontend
        run: cd packages/frontend && pnpm build
        env:
          VITE_API_URL: https://backend-production-77f3.up.railway.app

      - name: Deploy to Netlify
        run: |
          npm install -g netlify-cli
          netlify deploy --dir=packages/frontend/dist --prod --site=${{ secrets.NETLIFY_SITE_ID }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
